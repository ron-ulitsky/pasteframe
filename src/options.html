<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="options.css">
    <title>PasteFrame Options</title>
  </head>
  <body>
    <main>
      <h1>PasteFrame</h1>
      <div class="field">
        <label for="folderName">Drive folder</label>
        <input id="folderName" type="text" autocomplete="off" placeholder="PasteFrame">
      </div>
      <label class="checkbox">
        <input id="shareUploadedFiles" type="checkbox">
        <span>Make uploaded images readable by anyone with the link</span>
      </label>
      <p id="status" role="status"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
